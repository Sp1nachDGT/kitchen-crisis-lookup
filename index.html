        .container { max-width: 950px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        /* ヘッダー */
        .app-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .app-header h1 { margin: 0; font-size: 24px; color: #222; }
        .app-header .handle { font-size: 14px; color: #666; margin-top: 5px; }

        /* 素材ボタンエリア */
        .section-title { font-size: 14px; font-weight: bold; margin-bottom: 12px; color: #555; border-left: 4px solid #ccc; padding-left: 8px; }
        .ingredient-group-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .ing-btn { 
            width: 110px; height: 40px; border: 1px solid #ddd; border-radius: 6px; 
            cursor: pointer; font-size: 13px; text-align: center;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; background-color: #fff;
        }
        .ing-btn:hover { border-color: #999; }
        .ing-btn.active { outline: 3px solid #007bff; border-color: transparent; font-weight: bold; z-index: 1; }

        /* フィルタオプション */
        .filter-options { display: flex; gap: 20px; margin: 20px 0; padding: 15px; background: #f9f9f9; border-radius: 8px; font-size: 13px; border: 1px solid #eee; }
        .filter-options label { cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* 選択中エリア */
        .selected-area { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; min-height: 45px; padding: 8px; border-bottom: 2px solid #f0f0f0; }
        .selected-badge { padding: 4px 12px; border-radius: 4px; font-size: 12px; border: 1px solid rgba(0,0,0,0.1); font-weight: bold; }
        .clear-btn { padding: 6px 18px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .clear-btn:hover { background: #c0392b; }

        /* 料理リスト */
        .dish-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .dish-card { display: flex; align-items: flex-start; padding: 12px; border-radius: 10px; border: 1px solid #eee; background: #fff; }
        .rank-badge { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; flex-shrink: 0; font-size: 13px; border: 1px solid rgba(0,0,0,0.05); }
        .dish-info { flex-grow: 1; }
        .dish-name { font-weight: bold; font-size: 15px; margin-bottom: 6px; color: #222; }
        .dish-ings { font-size: 12px; color: #666; line-height: 1.6; }
        .highlight { background-color: #ffeb3b; color: #000; padding: 1px 4px; border-radius: 3px; font-weight: bold; border: 1px solid #fbc02d; }

        /* 素材カラー設定 */
        .bg-yellow { background-color: #FFF9C4; }
        .bg-gray { background-color: #F5F5F5; }
        .bg-red { background-color: #FFEBEE; }
        .bg-blue { background-color: #E3F2FD; }
        .bg-green-dark { background-color: #C8E6C9; } /* じゃがいも/にんじん両方これを使用 */
        .bg-purple { background-color: #F3E5F5; }
        .bg-brown { background-color: #EFEBE9; }

        /* ランクカラー */
        .rank-r5 { background-color: #FFE0B2; }
        .rank-r4 { background-color: #FCE4EC; }
        .rank-r3 { background-color: #E0F7FA; }
        .rank-r2 { background-color: #E8F5E9; }

        mainContainer.appendChild(row);
    });

    document.querySelectorAll('.hide-filter').forEach(cb => {
        cb.onchange = render;
    });

    document.getElementById('clear-btn').onclick = clearIngredients;
    render();
}

function toggleIngredient(name) {
    if (selectedIngredients.has(name)) {
        selectedIngredients.delete(name);
    } else {
        selectedIngredients.add(name);
    }
    updateButtons();
    render();
}

function clearIngredients() {
    selectedIngredients.clear();
    updateButtons();
    render();
}

function updateButtons() {
    document.querySelectorAll('.ing-btn').forEach(btn => {
        if (selectedIngredients.has(btn.dataset.name)) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
}

function render() {
    const listContainer = document.getElementById('dish-list');
    const iconContainer = document.getElementById('selected-icons');
    listContainer.innerHTML = '';
    iconContainer.innerHTML = '';

    // 選択アイコン表示
    selectedIngredients.forEach(name => {
        const badge = document.createElement('div');
        badge.className = `selected-badge ${getIngColor(name)}`;
        badge.textContent = name;
        iconContainer.appendChild(badge);
    });

    const activeHideFilters = Array.from(document.querySelectorAll('.hide-filter:checked')).map(cb => parseInt(cb.value));
    
    // フィルタリングと描画
    const filteredDishes = dishes.filter(dish => {
        for (let limit of activeHideFilters) {
            if (dish.ingredients.length <= limit) return false;
        }
        if (selectedIngredients.size > 0) {
            for (let needed of selectedIngredients) {
                if (!dish.ingredients.includes(needed)) return false;
            }
        }
        return true;
    });

    filteredDishes.forEach(dish => {
        const card = document.createElement('div');
        card.className = 'dish-card';
        const rankClass = `rank-${dish.rank.toLowerCase()}`;
        
        // 重要：素材をマスタの順序通りに並べ替える
        const sortedIngs = [...dish.ingredients].sort((a, b) => {
            return ingredientMasterOrder.indexOf(a) - ingredientMasterOrder.indexOf(b);
        });

        // ハイライト処理
        const ingredientsHtml = sortedIngs.map(ing => {
            if (selectedIngredients.has(ing)) {
                return `<span class="highlight">${ing}</span>`;
            }
            return ing;
        }).join('、');

        card.innerHTML = `
            <div class="rank-badge ${rankClass}">${dish.rank}</div>
            <div class="dish-info">
                <div class="dish-name">${dish.name}</div>
                <div class="dish-ings">${ingredientsHtml}</div>
            </div>
        `;
        listContainer.appendChild(card);
    });

    if (filteredDishes.length === 0) {
        listContainer.innerHTML = '<p style="font-size:12px; color: #999; grid-column: 1/-1; text-align: center; margin-top: 20px;">条件に合う料理がありません</p>';
    }
}

window.onload = init;
</script>

</body>
</html>
